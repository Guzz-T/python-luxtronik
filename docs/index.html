<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<title>Luxtronik data fields</title>
<style>
  body {
      font-family: sans-serif;
      margin: 10px;
      font-size: 12px;
  }

  .hide-col {
      display: none;
  }

  table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 11px;
      table-layout: fixed;
  }

  th, td {
      border: 1px solid #ccc;
      padding: 3px 4px;
      overflow: hidden;
      text-overflow: ellipsis;
  }

  th {
      background: #eee;
      font-weight: bold;
  }

  thead input {
      width: 95%;
      padding: 2px 3px;
      font-size: 11px;
      box-sizing: border-box;
  }

  td.description {
      white-space: pre-wrap;
  }

  th:nth-child(1), td:nth-child(1) { width: 10%; }    /* Category */
  th:nth-child(2), td:nth-child(2) { width: 7%; }     /* Index */
  th:nth-child(3), td:nth-child(3) { width: 12%; }    /* Name */
  th:nth-child(4), td:nth-child(4) { width: 5%; }     /* LSB */
  th:nth-child(5), td:nth-child(5) { width: 5%; }     /* Width */
  th:nth-child(6), td:nth-child(6) { width: 7%; }     /* Class */
  th:nth-child(7), td:nth-child(7) { width: 7%; }     /* Unit */
  th:nth-child(8), td:nth-child(8) { width: 7%; }     /* Writeable */
  th:nth-child(9), td:nth-child(9) { width: 7%; }     /* Since */
  th:nth-child(10), td:nth-child(10) { width: 8%; }   /* Until */
  th:nth-child(11), td:nth-child(11) { width: 25%; }  /* Description */

</style>
</head>

<body>

<h1>Luxtronik data fields</h1>

<p><div id="createdInfo"></div></p>

<div id="columnToggle" style="margin-bottom: 8px; font-size: 11px;">
  <label><input type="checkbox" data-col="1" checked>Category</label>
  <label><input type="checkbox" data-col="2" checked>Index</label>
  <label><input type="checkbox" data-col="3" checked>Name</label>
  <label><input type="checkbox" data-col="4" unchecked>LSB</label>
  <label><input type="checkbox" data-col="5" unchecked>Width</label>
  <label><input type="checkbox" data-col="6" checked>Class</label>
  <label><input type="checkbox" data-col="7" checked>Unit</label>
  <label><input type="checkbox" data-col="8" checked>Writeable</label>
  <label><input type="checkbox" data-col="9" unchecked>Since</label>
  <label><input type="checkbox" data-col="10" unchecked>Until</label>
  <label><input type="checkbox" data-col="11" checked>Description</label>
</div>

<table id="table">
    <thead>
        <tr>
            <th>Category</th>
            <th>Index</th>
            <th>Name</th>
            <th class="hide-col">LSB</th>
            <th class="hide-col">Width</th>
            <th>Class</th>
            <th>Unit</th>
            <th>Writeable</th>
            <th class="hide-col">Since</th>
            <th class="hide-col">Until</th>
            <th>Description</th>
        </tr>
        <tr>
            <th><input id="f_category"></th>
            <th><input id="f_index"></th>
            <th><input id="f_name"></th>
            <th class="hide-col"><input id="f_lsb"></th>
            <th class="hide-col"><input id="f_width"></th>
            <th><input id="f_class"></th>
            <th><input id="f_unit"></th>
            <th><input id="f_writeable"></th>
            <th class="hide-col"><input id="f_since"></th>
            <th class="hide-col"><input id="f_until"></th>
            <th><input id="f_description"></th>
        </tr>
    </thead>

    <tbody></tbody>
</table>

<!-- Data sources -->
<script src="visibility.js"></script>
<script src="parameter.js"></script>
<script src="calculation.js"></script>
<script src="input.js"></script>
<script src="holding.js"></script>

<!-- Main logic -->
<script src="scripts.js"></script>

</body>
</html>
